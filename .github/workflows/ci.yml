name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  build-and-test:
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, windows-latest]
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Julia
        uses: julia-actions/setup-julia@v1
        with:
          version: '1.12'

      - name: Install build tools (Linux)
        if: runner.os == 'Linux'
        run: |
          sudo apt-get update
          sudo apt-get install -y gcc

      - name: Instantiate Julia environment
        run: julia --project=. -e "using Pkg; Pkg.instantiate()"

      - name: Add JuliaC
        run: julia --project=. -e 'using Pkg; Pkg.add("JuliaC")'

      - name: Run tests
        if: runner.os == 'Windows'
        run: julia --project=. -e "using Pkg; Pkg.test()"

      - name: Build with JuliaC
        env:
          JULIA_CPU_TARGET: generic
          JULIA_CC: "gcc -Wl,--no-as-needed -lm"
        run: julia --project=. --startup-file=no -e "using JuliaC; JuliaC.main(ARGS)" -- --output-exe intsect --bundle build-${{ runner.os }} --trim=no ../Intsect.jl

      - name: Upload build dir
        uses: actions/upload-artifact@v4
        with:
          name: build-${{ runner.os }}
          path: build-${{ runner.os }}

  arenant-windows:
    runs-on: windows-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Julia
        uses: julia-actions/setup-julia@v1
        with:
          version: '1.12'

      - name: Instantiate Julia environment
        run: julia --project=. -e "using Pkg; Pkg.instantiate()"

      - name: Run Arenant
        run: julia --project=. --startup-file=no -e 'using Intsect; Intsect.Arenant.run_arena(debug=false, time_limit_s=0.01, full_debug=false, results_path="./arenant_results.txt")'

      - name: Upload arenant results
        uses: actions/upload-artifact@v4
        with:
          name: arenant_results.txt
          path: arenant_results.txt
