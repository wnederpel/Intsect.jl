stages:
  - arenant

arenant:
  stage: arenant
  image: julia
  script: 
    - chmod +x ./engines/MzingaEngine.exe ./engines/nokamute.exe
    - julia --project=. -e "using Pkg; Pkg.instantiate()"
    - julia --project=. -e "using Intsect; Arenant.run_arena(; debug=false, time_limit_s=0.1)"
  rules:
    - if: $CI_COMMIT_BRANCH == "main"